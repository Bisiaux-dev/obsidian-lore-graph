name: Release

# Build, attest, and publish a GitHub release whenever a version tag is pushed.
# Tags follow Obsidian's convention: the exact manifest version, no "v" prefix
# (e.g. 0.1.2). The built assets are attested with build provenance so users
# can cryptographically verify they came from this repository.

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # create the release
  id-token: write # required by attest-build-provenance
  attestations: write # write the provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" main.js manifest.json styles.css \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes "Release $TAG"

      # Notifie le vault template pour un resync instantané du plugin embarqué.
      # Le PAT (fine-grained, scope Contents:write sur lore-obsidian_priv) est
      # requis car le GITHUB_TOKEN par défaut ne peut pas écrire hors de ce repo.
      - name: Notifier le template (sync instantané)
        if: success() && env.DISPATCH_TOKEN != ''
        env:
          DISPATCH_TOKEN: ${{ secrets.LORE_OBSIDIAN_DISPATCH_TOKEN }}
          GH_TOKEN: ${{ secrets.LORE_OBSIDIAN_DISPATCH_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          echo "{\"event_type\":\"lore-graph-release\",\"client_payload\":{\"version\":\"$TAG\"}}" \
            | gh api --method POST repos/Bisiaux-dev/lore-obsidian_priv/dispatches --input -
          echo "::notice::repository_dispatch lore-graph-release envoyé ($TAG)."
